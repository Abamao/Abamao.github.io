<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia - 游戏天堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --accent-color: #00d4ff;
            --accent-purple: #9c27b0;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(0, 212, 255, 0.3);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        
        header h1 {
            font-size: 3.5em;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        header p {
            color: var(--text-secondary);
            font-size: 1.2em;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .game-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
        }
        
        .game-header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-color));
        }
        
        .game-content {
            padding: 20px;
        }
        
        .game-title {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .game-desc {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .play-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn">← 返回主页</a>
    
    <header>
        <h1>🎮 Arcadia</h1>
        <p>在这里，游戏就是一切</p>
    </header>
    
    <div class="container">
        <div class="games-grid">
            <div class="game-card">
                <div class="game-header">🐍</div>
                <div class="game-content">
                    <h3 class="game-title">贪吃蛇</h3>
                    <p class="game-desc">经典贪吃蛇游戏，吃食物变长，不要撞墙哦！</p>
                    <button class="play-btn" onclick="openGame('snake')">开始游戏</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-header">🧩</div>
                <div class="game-content">
                    <h3 class="game-title">2048</h3>
                    <p class="game-desc">数字合并游戏，合并相同数字，挑战 2048！</p>
                    <button class="play-btn" onclick="openGame('2048')">开始游戏</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-header">🎯</div>
                <div class="game-content">
                    <h3 class="game-title">打砖块</h3>
                    <p class="game-desc">使用球拍反弹球，打破所有砖块！</p>
                    <button class="play-btn" onclick="openGame('breakout')">开始游戏</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-header">🚀</div>
                <div class="game-content">
                    <h3 class="game-title">太空射击</h3>
                    <p class="game-desc">控制飞船射击敌人，躲避弹幕！</p>
                    <button class="play-btn" onclick="openGame('shooter')">开始游戏</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-header">🎵</div>
                <div class="game-content">
                    <h3 class="game-title">节奏跑酷</h3>
                    <p class="game-desc">跟随音乐节奏，躲避障碍物！</p>
                    <button class="play-btn" onclick="openGame('rhythm')">开始游戏</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-header">🎲</div>
                <div class="game-content">
                    <h3 class="game-title">更多游戏</h3>
                    <p class="game-desc">回到主站工具箱，发现更多有趣的游戏！</p>
                    <button class="play-btn" onclick="window.location.href='../'">返回主站</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openGame(game) {
            switch(game) {
                case 'snake':
                    openSnakeGame();
                    break;
                case '2048':
                    open2048Game();
                    break;
                case 'breakout':
                    openBreakoutGame();
                    break;
                case 'shooter':
                    openShooterGame();
                    break;
                case 'rhythm':
                    window.location.href = 'https://www.jogos.com/embed/index.html?id=chasingrhythm&adUserId=17766872955816393&sourceType=3&gd_sdk_referrer_url=Abamao.github.io';
                    break;
            }
        }

        function openSnakeGame() {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <button onclick="this.parentElement.remove()" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">关闭</button>
                    <h2 style="color: #00d4ff; margin-bottom: 20px;">🐍 贪吃蛇</h2>
                    <canvas id="snakeCanvas" width="400" height="400" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas>
                    <div style="margin-top: 20px; color: white;">
                        <span style="font-size: 20px;">分数: <span id="snakeScore">0</span></span>
                        <p style="margin-top: 10px; color: #888;">使用方向键或 WASD 控制</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            startSnake();
        }

        function startSnake() {
            const canvas = document.getElementById('snakeCanvas');
            const ctx = canvas.getContext('2d');
            const gridSize = 20;
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 15};
            let dx = 1, dy = 0;
            let score = 0;
            let gameLoop;

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                snake.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? '#00d4ff' : '#9c27b0';
                    ctx.fillRect(seg.x * gridSize, seg.y * gridSize, gridSize - 2, gridSize - 2);
                });

                ctx.fillStyle = '#ff4444';
                ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            }

            function update() {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};

                if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || 
                    snake.some(s => s.x === head.x && s.y === head.y)) {
                    clearInterval(gameLoop);
                    alert('游戏结束！分数: ' + score);
                    return;
                }

                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score++;
                    document.getElementById('snakeScore').textContent = score;
                    food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
                } else {
                    snake.pop();
                }
            }

            function gameStep() {
                update();
                draw();
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { if (dy !== 1) { dx = 0; dy = -1; } }
                if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { if (dy !== -1) { dx = 0; dy = 1; } }
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { if (dx !== 1) { dx = -1; dy = 0; } }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { if (dx !== -1) { dx = 1; dy = 0; } }
            });

            gameLoop = setInterval(gameStep, 150);
            draw();
        }

        function open2048Game() {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <button onclick="this.parentElement.remove()" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">关闭</button>
                    <h2 style="color: #00d4ff; margin-bottom: 20px;">🧩 2048</h2>
                    <div id="game2048" style="display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; background: #1a1a2e; padding: 15px; border-radius: 10px; border: 3px solid #00d4ff;"></div>
                    <div style="margin-top: 20px; color: white;">
                        <span style="font-size: 20px;">分数: <span id="score2048">0</span></span>
                        <p style="margin-top: 10px; color: #888;">使用方向键控制</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            start2048();
        }

        function start2048() {
            let grid = Array(4).fill(null).map(() => Array(4).fill(0));
            let score = 0;
            const container = document.getElementById('game2048');

            function getColor(val) {
                const colors = {
                    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
                    32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
                    512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
                };
                return colors[val] || '#cdc1b4';
            }

            function render() {
                container.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.style.cssText = `
                            width: 80px; height: 80px; background: ${getColor(grid[i][j])};
                            display: flex; align-items: center; justify-content: center;
                            font-size: 28px; font-weight: bold; color: ${grid[i][j] > 4 ? '#f9f6f2' : '#776e65'};
                            border-radius: 8px;
                        `;
                        cell.textContent = grid[i][j] || '';
                        container.appendChild(cell);
                    }
                }
                document.getElementById('score2048').textContent = score;
            }

            function addRandom() {
                const empty = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!grid[i][j]) empty.push({i, j});
                    }
                }
                if (empty.length) {
                    const cell = empty[Math.floor(Math.random() * empty.length)];
                    grid[cell.i][cell.j] = Math.random() > 0.9 ? 4 : 2;
                }
            }

            function slide(row) {
                let arr = row.filter(x => x);
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1]) {
                        arr[i] *= 2;
                        score += arr[i];
                        arr.splice(i + 1, 1);
                    }
                }
                while (arr.length < 4) arr.push(0);
                return arr;
            }

            function move(dir) {
                const old = JSON.stringify(grid);
                if (dir === 'left') {
                    grid = grid.map(slide);
                } else if (dir === 'right') {
                    grid = grid.map(row => slide(row.reverse()).reverse());
                } else if (dir === 'up') {
                    for (let j = 0; j < 4; j++) {
                        let col = slide([grid[0][j], grid[1][j], grid[2][j], grid[3][j]]);
                        for (let i = 0; i < 4; i++) grid[i][j] = col[i];
                    }
                } else if (dir === 'down') {
                    for (let j = 0; j < 4; j++) {
                        let col = slide([grid[3][j], grid[2][j], grid[1][j], grid[0][j]]).reverse();
                        for (let i = 0; i < 4; i++) grid[i][j] = col[i];
                    }
                }
                if (old !== JSON.stringify(grid)) addRandom();
            }

            document.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    move(e.key.replace('Arrow', '').toLowerCase());
                    render();
                }
            });

            addRandom(); addRandom(); render();
        }

        function openBreakoutGame() {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <button onclick="this.parentElement.remove()" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">关闭</button>
                    <h2 style="color: #00d4ff; margin-bottom: 20px;">🎯 打砖块</h2>
                    <canvas id="breakoutCanvas" width="600" height="400" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas>
                    <div style="margin-top: 20px; color: white;">
                        <span style="font-size: 20px;">分数: <span id="breakoutScore">0</span></span>
                        <p style="margin-top: 10px; color: #888;">使用 A/D 或 ←/→ 控制球拍</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            startBreakout();
        }

        function startBreakout() {
            const canvas = document.getElementById('breakoutCanvas');
            const ctx = canvas.getContext('2d');
            let paddle = { x: 250, y: 370, w: 100, h: 15 };
            let ball = { x: 300, y: 350, r: 10, dx: 4, dy: -4 };
            let bricks = [];
            let score = 0;
            let keys = {};

            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 8; j++) {
                    bricks.push({ x: j * 70 + 30, y: i * 30 + 30, w: 60, h: 20, c: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'][i] });
                }
            }

            document.addEventListener('keydown', e => keys[e.key] = true);
            document.addEventListener('keyup', e => keys[e.key] = false);

            function loop() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (keys['a'] || keys['A'] || keys['ArrowLeft']) paddle.x -= 7;
                if (keys['d'] || keys['D'] || keys['ArrowRight']) paddle.x += 7;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

                ball.x += ball.dx; ball.y += ball.dy;
                if (ball.x <= 0 || ball.x >= canvas.width) ball.dx *= -1;
                if (ball.y <= 0) ball.dy *= -1;

                if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                    ball.dy = -Math.abs(ball.dy);
                }

                bricks = bricks.filter(b => {
                    if (ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) {
                        ball.dy *= -1;
                        score++;
                        document.getElementById('breakoutScore').textContent = score;
                        return false;
                    }
                    return true;
                });

                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fillStyle = '#9c27b0';
                ctx.fill();

                bricks.forEach(b => {
                    ctx.fillStyle = b.c;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                });

                if (ball.y > canvas.height) {
                    alert('游戏结束！分数: ' + score);
                    return;
                }
                if (bricks.length === 0) {
                    alert('恭喜通关！');
                    return;
                }

                requestAnimationFrame(loop);
            }
            loop();
        }

        function openShooterGame() {
            const modal = document.createElement('div');
            modal.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <button onclick="this.parentElement.remove()" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">关闭</button>
                    <h2 style="color: #00d4ff; margin-bottom: 20px;">🚀 太空射击</h2>
                    <canvas id="shooterCanvas" width="600" height="500" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas>
                    <div style="margin-top: 20px; color: white;">
                        <span style="font-size: 20px;">分数: <span id="shooterScore">0</span></span>
                        <p style="margin-top: 10px; color: #888;">A/D 移动，空格射击</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            startShooter();
        }

        function startShooter() {
            const canvas = document.getElementById('shooterCanvas');
            const ctx = canvas.getContext('2d');
            let player = { x: 275, y: 450, w: 50, h: 30 };
            let bullets = [];
            let enemies = [];
            let score = 0;
            let keys = {};

            document.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === ' ') bullets.push({ x: player.x + 22, y: player.y, w: 6, h: 15 });
            });
            document.addEventListener('keyup', e => keys[e.key] = false);

            setInterval(() => {
                enemies.push({ x: Math.random() * 550, y: 0, w: 40, h: 30, s: 2 + Math.random() * 2 });
            }, 1000);

            function loop() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (keys['a'] || keys['A'] || keys['ArrowLeft']) player.x -= 6;
                if (keys['d'] || keys['D'] || keys['ArrowRight']) player.x += 6;
                player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

                bullets = bullets.filter(b => { b.y -= 10; return b.y > 0; });
                enemies = enemies.filter(e => { e.y += e.s; return e.y < canvas.height; });

                enemies = enemies.filter(e => {
                    for (let i = bullets.length - 1; i >= 0; i--) {
                        const b = bullets[i];
                        if (b.x >= e.x && b.x <= e.x + e.w && b.y >= e.y && b.y <= e.y + e.h) {
                            bullets.splice(i, 1);
                            score++;
                            document.getElementById('shooterScore').textContent = score;
                            return false;
                        }
                    }
                    return true;
                });

                for (const e of enemies) {
                    if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
                        alert('游戏结束！分数: ' + score);
                        return;
                    }
                }

                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(player.x, player.y, player.w, player.h);
                bullets.forEach(b => { ctx.fillStyle = '#9c27b0'; ctx.fillRect(b.x, b.y, b.w, b.h); });
                enemies.forEach(e => { ctx.fillStyle = '#ff6b6b'; ctx.fillRect(e.x, e.y, e.w, e.h); });

                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
