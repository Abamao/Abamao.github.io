<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通义千问 - 个人AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
        }

        .message.assistant .message-avatar {
            background: #28a745;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .typing {
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            display: inline-flex;
            gap: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .chat-input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #667eea;
        }

        .chat-input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            padding: 8px 20px;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .status-bar.error {
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 通义千问</h1>
        <p>个人AI助手 | 回答问题 · 写代码 · 创作内容</p>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-content">你好！我是通义千问，有什么可以帮助你的吗？</div>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
    <div class="status-bar" id="statusBar">✨ 就绪，点击发送开始对话</div>
</div>

<script>
    // ============================================================
    // ⚠️ 重要：请在这里填写你的 API-KEY
    // 获取地址：https://dashscope.console.aliyun.com/apiKey
    // ============================================================
    const API_KEY = 'sk-6fc6194df63d44b9b4c397d5a78a1e96';
    
    // 模型选择：qwen-turbo(最快) / qwen-plus(平衡) / qwen-max(最强)
    const MODEL = 'qwen-plus';
    
    // API 地址
    const API_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
    
    // ============================================================
    // 以下代码无需修改
    // ============================================================
    
    let isWaiting = false;
    let currentReplyElement = null;
    let fullReply = '';
    
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusBar = document.getElementById('statusBar');
    
    function setStatus(text, isError = false) {
        statusBar.textContent = text;
        statusBar.className = isError ? 'status-bar error' : 'status-bar';
    }
    
    function addMessage(content, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `
            <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
            <div class="message-content">${escapeHtml(content)}</div>
        `;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageDiv;
    }
    
    function addTypingIndicator() {
        const indicatorDiv = document.createElement('div');
        indicatorDiv.className = 'message assistant';
        indicatorDiv.id = 'typingIndicator';
        indicatorDiv.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="typing"><span></span><span></span><span></span></div>
        `;
        chatMessages.appendChild(indicatorDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }
    
    function updateStreamingMessage(content) {
        if (!currentReplyElement) {
            // 创建新的回复消息元素
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content"></div>
            `;
            chatMessages.appendChild(messageDiv);
            currentReplyElement = messageDiv.querySelector('.message-content');
        }
        currentReplyElement.innerHTML = escapeHtml(content);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function finishStreaming() {
        currentReplyElement = null;
        fullReply = '';
        isWaiting = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
        setStatus('✨ 就绪');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function sendMessage() {
        if (isWaiting) return;
        
        const userMessage = messageInput.value.trim();
        if (!userMessage) return;
        
        // 清空输入框
        messageInput.value = '';
        
        // 显示用户消息
        addMessage(userMessage, 'user');
        
        // 设置等待状态
        isWaiting = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        
        // 显示打字动画
        addTypingIndicator();
        
        // 准备消息历史（这里简单处理，只发当前消息）
        // 如需多轮对话，可以将历史消息也传过去[citation:10]
        const messages = [
            { role: 'user', content: userMessage }
        ];
        
        try {
            setStatus('🤔 AI 正在思考...');
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messages,
                    stream: true,  // 开启流式输出，实时显示效果[citation:3][citation:7]
                    temperature: 0.8
                })
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API请求失败: ${response.status} - ${errorText}`);
            }
            
            // 移除打字动画
            removeTypingIndicator();
            
            // 处理流式响应
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            fullReply = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                buffer += chunk;
                
                // 按行分割处理 SSE 格式数据[citation:7]
                const lines = buffer.split('\n');
                buffer = lines.pop() || ''; // 保留不完整的行
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const jsonStr = trimmed.slice(6);
                            const data = JSON.parse(jsonStr);
                            const content = data.choices?.[0]?.delta?.content;
                            if (content) {
                                fullReply += content;
                                updateStreamingMessage(fullReply);
                                setStatus('📝 正在生成...');
                            }
                        } catch (e) {
                            // 忽略解析错误，继续处理
                            console.debug('Parse error:', e);
                        }
                    }
                }
            }
            
            // 如果没有收到任何内容，显示提示
            if (!fullReply) {
                updateStreamingMessage('抱歉，没有收到回复，请重试。');
            }
            
            setStatus('✅ 回复完成');
            
        } catch (error) {
            console.error('Error:', error);
            removeTypingIndicator();
            setStatus(`❌ 错误: ${error.message}`, true);
            addMessage(`错误: ${error.message}\n\n请检查 API-KEY 是否正确设置。`, 'assistant');
        } finally {
            finishStreaming();
        }
    }
    
    function handleKeyPress(event) {
        if (event.key === 'Enter' && !isWaiting) {
            sendMessage();
        }
    }
    
    // 启动时检查 API-KEY
    if (API_KEY === 'sk-请替换为你的真实API-KEY') {
        setStatus('⚠️ 请先在代码中设置你的 API-KEY', true);
        sendBtn.disabled = true;
    } else {
        setStatus('✨ 就绪，点击发送开始对话');
    }
</script>
</body>
</html>
