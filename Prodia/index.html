<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodia - 动画游戏天堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent-color: #00d4ff;
            --accent-purple: #9c27b0;
            --accent-pink: #ff6b9d;
            --accent-green: #00ff88;
            --accent-orange: #ff9f43;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(0, 212, 255, 0.3);
            --glass-bg: rgba(26, 26, 46, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.15s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .top-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple));
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        header {
            text-align: center;
            padding: 100px 20px 60px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        header h1 {
            font-size: 4em;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite, glow 2s ease-in-out infinite;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.3em;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
            50% { text-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 60px rgba(156, 39, 176, 0.6); }
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.3em;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            animation: fadeInUp 1s ease-out;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            border-color: var(--accent-color);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .search-bar {
            max-width: 400px;
            margin: 40px auto 20px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 18px 25px;
            padding-left: 50px;
            font-size: 18px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInUp 0.8s ease-out 0.3s both;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent-color);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .search-bar input:focus::placeholder {
            color: transparent;
        }



        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background: var(--glass-bg);
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            animation: slideInUp 0.6s ease-out forwards;
        }

        .category-tab:nth-child(1) { animation-delay: 0.4s; }
        .category-tab:nth-child(2) { animation-delay: 0.45s; }
        .category-tab:nth-child(3) { animation-delay: 0.5s; }
        .category-tab:nth-child(4) { animation-delay: 0.55s; }
        .category-tab:nth-child(5) { animation-delay: 0.6s; }
        .category-tab:nth-child(6) { animation-delay: 0.65s; }

        .category-tab:hover, .category-tab.active {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple));
            color: white;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            border-color: var(--accent-color);
        }

        .category-tab.active {
            animation: pulse 0.6s ease-in-out, slideInUp 0.6s ease-out forwards;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: slideInUp 0.8s ease-out forwards;
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
        .game-card:nth-child(5) { animation-delay: 0.5s; }
        .game-card:nth-child(6) { animation-delay: 0.6s; }
        .game-card:nth-child(7) { animation-delay: 0.7s; }
        .game-card:nth-child(8) { animation-delay: 0.8s; }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
        }

        .game-card:hover .game-header {
            transform: scale(1.05);
        }

        .game-card:hover .game-title {
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        .game-card.hidden {
            display: none;
        }

        .game-card.hidden {
            display: none;
        }

        .game-header {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-color));
            position: relative;
            overflow: hidden;
        }

        .game-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { left: 100%; }
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: auto;
        }

        .favorite-btn:hover {
            transform: scale(1.3);
            animation: pulse 0.6s ease-in-out;
        }

        .game-description {
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.4;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }

        .game-card:hover .game-description {
            color: var(--text-primary);
        }



        .favorite-btn.active {
            animation: pulse 0.5s ease;
        }

        .game-desc {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .game-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .game-tag {
            padding: 4px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            font-size: 0.8em;
            color: var(--accent-color);
        }

        .play-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 15px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            border-radius: 15px;
            color: white;
            z-index: 10000;
            transition: transform 0.3s ease;
            animation: toastIn 0.3s ease forwards;
        }

        @keyframes toastIn {
            to { transform: translateX(-50%) translateY(0); }
        }

        .toast.success {
            border-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.2);
        }

        .toast.error {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.2);
        }

        .fullscreen-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fullscreen-header {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 10000;
        }

        .fullscreen-btn {
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 16px;
        }

        .fullscreen-btn:hover {
            background: var(--accent-color);
            transform: scale(1.05);
        }

        .fullscreen-btn.close {
            background: #ff4444;
        }

        .fullscreen-title {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 2em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 15px;
            }

            .stat-item {
                padding: 10px 20px;
            }

            .top-bar {
                right: 10px;
                top: 80px;
            }

            .back-btn {
                left: 10px;
                top: 80px;
            }
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-secondary);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .night-mode {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #111111;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .settings-modal {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .settings-modal h2 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: var(--bg-primary);
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .toggle-switch.active {
            background: var(--accent-color);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.15s ease;
        }

        .toggle-switch.active::after {
            left: 26px;
        }
    </style>
</head>
<body onload="init()">
    <canvas id="particles-canvas"></canvas>

    <a href="../" class="back-btn">← 返回主页</a>

    <div class="top-bar">
        <button class="icon-btn" onclick="showSettings()" title="设置">⚙️</button>
        <button class="icon-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>
        <button class="icon-btn" onclick="toggleNightMode()" title="夜间模式">🌙</button>
    </div>

    <header>
        <h1>🎮 Arcadia</h1>
        <p>在这里，游戏就是一切</p>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalGames">26</div>
                <div class="stat-label">游戏总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="playedGames">0</div>
                <div class="stat-label">已玩过</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalTime">0h</div>
                <div class="stat-label">游戏时长</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="highScore">0</div>
                <div class="stat-label">最高分</div>
            </div>
        </div>
    </header>

    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索游戏..." oninput="filterGames()">
    </div>

    <div class="category-tabs">
        <button class="category-tab active" onclick="filterCategory('all')">全部</button>
        <button class="category-tab" onclick="filterCategory('classic')">经典</button>
        <button class="category-tab" onclick="filterCategory('puzzle')">益智</button>
        <button class="category-tab" onclick="filterCategory('action')">动作</button>
        <button class="category-tab" onclick="filterCategory('rhythm')">音乐</button>
        <button class="category-tab" onclick="filterCategory('online')">在线</button>
    </div>

    <div class="container">
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
        <div class="settings-modal" onclick="event.stopPropagation()">
            <h2>⚙️ 设置</h2>
            <div class="setting-item">
                <span>夜间模式</span>
                <div class="toggle-switch" id="nightToggle" onclick="toggleNightMode()"></div>
            </div>
            <div class="setting-item">
                <span>粒子效果</span>
                <div class="toggle-switch active" id="particleToggle" onclick="toggleParticles()"></div>
            </div>
            <div class="setting-item">
                <span>游戏音效</span>
                <div class="toggle-switch active" id="soundToggle" onclick="toggleSound()"></div>
            </div>
            <div class="setting-item">
                <span>自动保存</span>
                <div class="toggle-switch active" id="saveToggle" onclick="toggleAutoSave()"></div>
            </div>
            <button class="fullscreen-btn close" onclick="closeSettings()" style="width: 100%; margin-top: 20px;">关闭</button>
        </div>
    </div>

    <div class="fullscreen-modal" id="gameModal">
        <div class="fullscreen-header">
            <button class="fullscreen-btn" onclick="toggleGameFullscreen()">⛶ 全屏</button>
            <button class="fullscreen-btn" onclick="restartGame()">🔄 重玩</button>
            <button class="fullscreen-btn close" onclick="closeGame()">✕ 关闭</button>
        </div>
        <h2 class="fullscreen-title" id="gameTitle">游戏</h2>
        <div id="gameContainer"></div>
    </div>

    <script>
        const games = [
            { id: 'snake', name: '贪吃蛇', icon: '🐍', desc: '经典贪吃蛇游戏，吃食物变长，不要撞墙哦！', category: 'classic', tag: '经典' },
            { id: '2048', name: '2048', icon: '🧩', desc: '数字合并游戏，合并相同数字，挑战 2048！', category: 'puzzle', tag: '益智' },
            { id: 'breakout', name: '打砖块', icon: '🎯', desc: '使用球拍反弹球，打破所有砖块！', category: 'classic', tag: '经典' },
            { id: 'shooter', name: '太空射击', icon: '🚀', desc: '控制飞船射击敌人，躲避弹幕！', category: 'action', tag: '动作' },
            { id: 'rhythm', name: '节奏跑酷', icon: '🎵', desc: '跟随音乐节奏，躲避障碍物！', category: 'rhythm', tag: '音乐' },
            { id: 'tetris', name: '俄罗斯方块', icon: '🧱', desc: '经典方块下落游戏，填满行消除！', category: 'classic', tag: '经典' },
            { id: 'pong', name: '乒乓球', icon: '🏓', desc: '双人乒乓球对战！', category: 'classic', tag: '经典' },
            { id: 'memory', name: '记忆翻牌', icon: '🃏', desc: '翻牌配对，考验记忆力！', category: 'puzzle', tag: '益智' },
            { id: 'minesweeper', name: '扫雷', icon: '💣', desc: '经典扫雷游戏，找出所有地雷！', category: 'puzzle', tag: '益智' },
            { id: 'connect4', name: '四子棋', icon: '⭕', desc: '和电脑对战四子棋！', category: 'puzzle', tag: '益智' },

            { id: 'typing', name: '打字游戏', icon: '⌨️', desc: '打字速度大挑战！', category: 'action', tag: '动作' },

        let stats = JSON.parse(localStorage.getItem('arcadiaStats')) || {

        function init() {
            renderGames();

            const grid = document.getElementById('gamesGrid');

        function filterGames() {
            const search = document.getElementById('searchInput').value.toLowerCase();

        function toggleFavorite(id, event) {
            event.stopPropagation();

        function openGame(gameId) {

            if (!stats.recentGames.includes(gameId)) {

                    case 'connect4': startConnect4(container); break;
                    case 'racer': startRacer(container); break;
                    case 'typing': startTyping(container); break;
                    case 'flappy': startFlappy(container); break;

                    case 'wings': window.location.href = 'https://wings.io/'; break;

        function closeGame() {

        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            if (!particlesEnabled) {
                canvas.style.display = 'none';
                return;
            }
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: Math.random() * 2 - 1,
                    speedY: Math.random() * 2 - 1,
                    color: `rgba(0, ${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 255)}, ${Math.random() * 0.5 + 0.2})`
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });

                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(0, 212, 255, ${0.2 * (1 - dist / 100)})`;
                            ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        function updateScore(score) {
            if (score > stats.highScore) {
                stats.highScore = score;
                saveStats();
                updateStats();
                showToast(`🎉 新纪录！${score}分`, 'success');
            }
        }

        function startSnake(container) {
            container.innerHTML = `
                <canvas id="snakeCanvas" width="400" height="400" style="border: 3px solid var(--accent-color); border-radius: 10px;"></canvas>
                <div style="margin-top: 20px; color: white; font-size: 20px;">分数: <span id="snakeScore">0</span></div>
            `;
            
            const canvas = document.getElementById('snakeCanvas');
            const ctx = canvas.getContext('2d');
            const gridSize = 20;
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 15};
            let dx = 1, dy = 0;
            let score = 0;

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                snake.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? '#00d4ff' : '#9c27b0';
                    ctx.fillRect(seg.x * gridSize, seg.y * gridSize, gridSize - 2, gridSize - 2);
                });
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            }

            function update() {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                    updateScore(score);
                    alert('游戏结束！分数: ' + score);
                    closeGame();
                    return;
                }
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    document.getElementById('snakeScore').textContent = score;
                    food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
                } else {
                    snake.pop();
                }
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
                if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
                if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
                if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            });

            const gameLoop = setInterval(() => {
                update();
                draw();
            }, 150);
            
            draw();
            currentGameLoop = gameLoop;
        }

        function start2048(container) {
            container.innerHTML = `
                <div id="game2048" style="display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; background: #1a1a2e; padding: 15px; border-radius: 10px; border: 3px solid #00d4ff;"></div>
                <div style="margin-top: 20px; color: white; font-size: 20px;">分数: <span id="score2048">0</span></div>
            `;
            
            let grid = Array(4).fill(null).map(() => Array(4).fill(0));
            let score = 0;
            const containerEl = document.getElementById('game2048');

            function getColor(val) {
                const colors = { 2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563', 32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61', 512: '#edc850', 1024: '#edc53f', 2048: '#edc22e' };
                return colors[val] || '#cdc1b4';
            }

            function render() {
                containerEl.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.style.cssText = `width: 80px; height: 80px; background: ${getColor(grid[i][j])}; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: ${grid[i][j] > 4 ? '#f9f6f2' : '#776e65'}; border-radius: 8px;`;
                        cell.textContent = grid[i][j] || '';
                        containerEl.appendChild(cell);
                    }
                }
                document.getElementById('score2048').textContent = score;
            }

            function addRandom() {
                const empty = [];
                for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) if (!grid[i][j]) empty.push({i, j});
                if (empty.length) { const cell = empty[Math.floor(Math.random() * empty.length)]; grid[cell.i][cell.j] = Math.random() > 0.9 ? 4 : 2; }
            }

            function slide(row) {
                let arr = row.filter(x => x);
                for (let i = 0; i < arr.length - 1; i++) if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr.splice(i + 1, 1); }
                while (arr.length < 4) arr.push(0);
                return arr;
            }

            function move(dir) {
                const old = JSON.stringify(grid);
                if (dir === 'left') grid = grid.map(slide);
                else if (dir === 'right') grid = grid.map(row => slide(row.reverse()).reverse());
                else if (dir === 'up') for (let j = 0; j < 4; j++) { let col = slide([grid[0][j], grid[1][j], grid[2][j], grid[3][j]]); for (let i = 0; i < 4; i++) grid[i][j] = col[i]; }
                else if (dir === 'down') for (let j = 0; j < 4; j++) { let col = slide([grid[3][j], grid[2][j], grid[1][j], grid[0][j]]).reverse(); for (let i = 0; i < 4; i++) grid[i][j] = col[i]; }
                if (old !== JSON.stringify(grid)) addRandom();
            }

            document.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    move(e.key.replace('Arrow', '').toLowerCase());
                    render();
                }
            });

            addRandom(); addRandom(); render();
        }

        function startBreakout(container) {
            container.innerHTML = `
                <canvas id="breakoutCanvas" width="600" height="400" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas>
                <div style="margin-top: 20px; color: white; font-size: 20px;">分数: <span id="breakoutScore">0</span></div>
            `;
            
            const canvas = document.getElementById('breakoutCanvas');
            const ctx = canvas.getContext('2d');
            let paddle = { x: 250, y: 370, w: 100, h: 15 };
            let ball = { x: 300, y: 350, r: 10, dx: 4, dy: -4 };
            let bricks = [];
            let score = 0;
            let keys = {};

            for (let i = 0; i < 5; i++) for (let j = 0; j < 8; j++) bricks.push({ x: j * 70 + 30, y: i * 30 + 30, w: 60, h: 20, c: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'][i] });
            document.addEventListener('keydown', e => keys[e.key] = true);
            document.addEventListener('keyup', e => keys[e.key] = false);

            function loop() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (keys['a'] || keys['ArrowLeft']) paddle.x -= 7;
                if (keys['d'] || keys['ArrowRight']) paddle.x += 7;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
                ball.x += ball.dx; ball.y += ball.dy;
                if (ball.x <= 0 || ball.x >= canvas.width) ball.dx *= -1;
                if (ball.y <= 0) ball.dy *= -1;
                if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) ball.dy = -Math.abs(ball.dy);
                bricks = bricks.filter(b => { if (ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) { ball.dy *= -1; score++; document.getElementById('breakoutScore').textContent = score; return false; } return true; });
                ctx.fillStyle = '#00d4ff'; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = '#9c27b0'; ctx.fill();
                bricks.forEach(b => { ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, b.w, b.h); });
                if (ball.y > canvas.height) { updateScore(score); alert('游戏结束！分数: ' + score); closeGame(); return; }
                if (bricks.length === 0) { updateScore(score); alert('恭喜通关！'); closeGame(); return; }
                currentGameLoop = requestAnimationFrame(loop);
            }
            loop();
         }
 
         function startShooter(container) {
            container.innerHTML = `
                <canvas id="shooterCanvas" width="600" height="500" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas>
                <div style="margin-top: 20px; color: white; font-size: 20px;">分数: <span id="shooterScore">0</span></div>
            `;
            
            const canvas = document.getElementById('shooterCanvas');
            const ctx = canvas.getContext('2d');
            let player = { x: 275, y: 450, w: 50, h: 30 };
            let bullets = [];
            let enemies = [];
            let score = 0;
            let keys = {};

            document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') bullets.push({ x: player.x + 22, y: player.y, w: 6, h: 15 }); });
            document.addEventListener('keyup', e => keys[e.key] = false);
            setInterval(() => { enemies.push({ x: Math.random() * 550, y: 0, w: 40, h: 30, s: 2 + Math.random() * 2 }); }, 1000);

            function loop() {
                ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (keys['a'] || keys['ArrowLeft']) player.x -= 6;
                if (keys['d'] || keys['ArrowRight']) player.x += 6;
                player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
                bullets = bullets.filter(b => { b.y -= 10; return b.y > 0; });
                enemies = enemies.filter(e => { e.y += e.s; return e.y < canvas.height; });
                enemies = enemies.filter(e => { for (let i = bullets.length - 1; i >= 0; i--) { const b = bullets[i]; if (b.x >= e.x && b.x <= e.x + e.w && b.y >= e.y && b.y <= e.y + e.h) { bullets.splice(i, 1); score++; document.getElementById('shooterScore').textContent = score; return false; } } return true; });
                for (const e of enemies) { if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) { updateScore(score); alert('游戏结束！分数: ' + score); closeGame(); return; } }

        }

        function startTank(container) {
            container.innerHTML = '<canvas id="tankCanvas" width="600" height="500" style="border: 3px solid #00d4ff; border-radius: 10px;"></canvas><div style="margin-top: 20px; color: white;">分数: <span id="tankScore">0</span> - WASD移动 空格射击</div>';
            const canvas = document.getElementById('tankCanvas');
            const ctx = canvas.getContext('2d');
            let tank = { x: 50, y: 450, angle: 0 }, bullets = [], enemies = [], score = 0;
            let keys = {};
            document.addEventListener('keydown', e => { keys[e.key] = true; if (e.code === 'Space') bullets.push({ x: tank.x + 15, y: tank.y, angle: tank.angle }); });
            document.addEventListener('keyup', e => keys[e.key] = false);
            setInterval(() => { enemies.push({ x: Math.random() * 560, y: 0, angle: Math.PI / 2 }); }, 2000);
            function loop() {
                ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, 600, 500);
                if (keys['w'] || keys['W']) { tank.x += Math.cos(tank.angle) * 3; tank.y += Math.sin(tank.angle) * 3; }
                if (keys['s'] || keys['S']) { tank.x -= Math.cos(tank.angle) * 3; tank.y -= Math.sin(tank.angle) * 3; }
                if (keys['a'] || keys['A']) tank.angle -= 0.1;
                if (keys['d'] || keys['D']) tank.angle += 0.1;
                tank.x = Math.max(10, Math.min(590, tank.x)); tank.y = Math.max(10, Math.min(490, tank.y));
                ctx.save(); ctx.translate(tank.x, tank.y); ctx.rotate(tank.angle); ctx.fillStyle = '#00d4ff'; ctx.fillRect(-15, -15, 30, 30); ctx.fillStyle = '#9c27b0'; ctx.fillRect(10, -5, 20, 10); ctx.restore();
                bullets.forEach(b => { b.x += Math.cos(b.angle) * 8; b.y += Math.sin(b.angle) * 8; ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fill(); });
                bullets = bullets.filter(b => b.x > 0 && b.x < 600 && b.y > 0 && b.y < 500);
                enemies.forEach(e => { e.y += 1.5; ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle); ctx.fillStyle = '#ff0000'; ctx.fillRect(-15, -15, 30, 30); ctx.fillStyle = '#ff6b6b'; ctx.fillRect(10, -5, 20, 10); ctx.restore(); });
                enemies = enemies.filter(e => { for (let i = bullets.length - 1; i >= 0; i--) { const b = bullets[i]; if (Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) { bullets.splice(i, 1); score += 50; document.getElementById('tankScore').textContent = score; return false; } } return e.y < 500; });
                enemies.forEach(e => { if (Math.abs(e.x - tank.x) < 25 && Math.abs(e.y - tank.y) < 25) { updateScore(score); alert('游戏结束！分数: ' + score); closeGame(); return; } });
                currentGameLoop = requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
